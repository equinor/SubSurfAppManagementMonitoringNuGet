name: Release to NuGet

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-preview*"
      - "v[0-9]+.[0-9]+.[0-9]+-alpha*"
      - "v[0-9]+.[0-9]+.[0-9]+-beta*"
      - "v[0-9]+.[0-9]+.[0-9]+-rc*"

permissions: {}

jobs:
  build:
    permissions: 
      id-token: write
      contents: read
      
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with: 
        persist-credentials: false

    - name: Set up .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
      with:
        dotnet-version: '8.0.x'
    
    - name: Set VERSION variable from tag
      run: echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV
      
    - name: build
      working-directory: Equinor.SubSurfAppManagementMonitoringNuGet
      run: dotnet build --configuration Release
      
    - name: Pack
      working-directory: Equinor.SubSurfAppManagementMonitoringNuGet
      run: dotnet pack --configuration Release /p:Version=${VERSION} --output .
          
    # Get a short-lived NuGet API key via OIDC trusted publishing
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544
      id: login
      with:
        user: ${{ secrets.NUGET_USER }} # nuget.org username (profile name), NOT your email address 
    
    # Push the package
    - name: NuGet push
      working-directory: Equinor.SubSurfAppManagementMonitoringNuGet
      run: dotnet nuget push Equinor.SubSurfAppManagementMonitoringNuGet.${VERSION}.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json

